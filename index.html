<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Attendance Logger</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .card {
      background: white; border-radius: 24px; padding: 36px 28px;
      max-width: 420px; width: 100%; box-shadow: 0 30px 60px rgba(0,0,0,0.4); text-align: center;
    }
    .logo {
      width: 72px; height: 72px; background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 18px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 32px;
    }
    h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 24px; }
    .info-row {
      display: flex; align-items: flex-start; background: #f8f9ff; border-radius: 12px;
      padding: 14px 16px; margin-bottom: 10px; text-align: left; gap: 12px;
    }
    .info-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
    .info-label { font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
    .info-value { font-size: 13px; font-weight: 500; color: #1a1a2e; margin-top: 3px; word-break: break-all; }
    .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-top: 3px; }
    .badge-yellow { background: #fff3cd; color: #856404; }
    .badge-green  { background: #d1fae5; color: #065f46; }
    .badge-red    { background: #fee2e2; color: #991b1b; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 18px; transition: all .2s; }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; box-shadow: 0 8px 20px rgba(102,126,234,.4); }
    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .result-box { margin-top: 16px; padding: 14px 16px; border-radius: 12px; font-size: 13px; font-weight: 500; text-align: left; display: none; line-height: 1.6; white-space: pre-line; }
    .result-box.success { background: #d1fae5; color: #065f46; display: block; }
    .result-box.error   { background: #fee2e2; color: #991b1b; display: block; }
    .qr-badge { display: inline-block; margin-bottom: 18px; background: linear-gradient(135deg,#667eea22,#764ba222); border: 1.5px solid #667eea55; border-radius: 10px; padding: 7px 14px; font-size: 13px; font-weight: 700; color: #4c3d8f; }
    .spinner { display: inline-block; width: 15px; height: 15px; border: 2.5px solid #ffffff55; border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 7px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #hiddenFrame { display: none; }
    footer { margin-top: 20px; font-size: 11px; color: #bbb; }
  </style>
</head>
<body>

<iframe id="hiddenFrame" name="hiddenFrame"></iframe>

<div class="card">
  <div class="logo">📍</div>
  <h1>QR Attendance Check-In</h1>
  <p class="subtitle">Your scan is being recorded automatically</p>

  <div class="qr-badge">🔗 QR ID: <span id="qrIdText">—</span></div>

  <div class="info-row">
    <span class="info-icon">🕐</span>
    <div>
      <div class="info-label">Timestamp</div>
      <div class="info-value" id="tsVal">—</div>
    </div>
  </div>

  <div class="info-row">
    <span class="info-icon">📡</span>
    <div>
      <div class="info-label">Location (GPS)</div>
      <div class="info-value" id="locVal">
        <span class="badge badge-yellow"><span class="dot"></span> Requesting GPS…</span>
      </div>
    </div>
  </div>

  <div class="info-row">
    <span class="info-icon">📱</span>
    <div>
      <div class="info-label">Device</div>
      <div class="info-value" id="devVal">—</div>
    </div>
  </div>

  <button class="btn btn-primary" id="submitBtn" disabled onclick="submitAttendance()">
    ⏳ Waiting for GPS…
  </button>

  <div class="result-box" id="resultBox"></div>
  <footer>Powered by Google Sheets + Apps Script</footer>
</div>

<script>
  // ══════════════════════════════════════════════════════════════
  //  🔴 STEP 1: Replace this with your Apps Script Web App URL
  //  How to get it:
  //    Apps Script editor → Deploy → New Deployment
  //    → Web App → Execute as: Me → Access: Anyone → Deploy
  //    → Copy the URL and paste it below
  // ══════════════════════════════════════════════════════════════
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzv-bqPdSX7zsO2178ryptdbrmafr3jOuvdeM5QC-XdMyoadkQhREaSU2RkQu1hJbF8Sw/exec";
  // ══════════════════════════════════════════════════════════════

  const params = new URLSearchParams(window.location.search);
  const qrId   = params.get("id") || "NO-ID";
  const now    = new Date();
  let lat = null, lng = null;

  document.getElementById("qrIdText").textContent = qrId;
  document.getElementById("tsVal").textContent =
    now.toLocaleString("en-US", { dateStyle: "medium", timeStyle: "medium" });
  document.getElementById("devVal").textContent =
    navigator.userAgent.substring(0, 80) + "…";

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        lat = pos.coords.latitude.toFixed(6);
        lng = pos.coords.longitude.toFixed(6);
        document.getElementById("locVal").innerHTML =
          `<span class="badge badge-green">✅ ${lat}, ${lng}</span>`;
        readyToSubmit();
      },
      err => {
        lat = "DENIED"; lng = "DENIED";
        document.getElementById("locVal").innerHTML =
          `<span class="badge badge-red">⚠️ Denied — logging without GPS</span>`;
        readyToSubmit();
      },
      { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
    );
  } else {
    lat = "N/A"; lng = "N/A";
    document.getElementById("locVal").innerHTML =
      `<span class="badge badge-red">⚠️ GPS not supported</span>`;
    readyToSubmit();
  }

  function readyToSubmit() {
    const btn = document.getElementById("submitBtn");
    btn.disabled = false;
    btn.textContent = "✅ Submit Attendance";
  }

  // Uses hidden iframe + HTML form — this is the MOST RELIABLE way
  // to POST data to Google Apps Script from a browser. It fully
  // bypasses CORS since the browser handles the form natively.
  function submitAttendance() {
    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Logging to Google Sheets…';

    const form = document.createElement("form");
    form.method  = "POST";
    form.action  = APPS_SCRIPT_URL;
    form.target  = "hiddenFrame";
    form.style.display = "none";

    const fields = {
      qrId:      qrId,
      timestamp: now.toISOString(),
      lat:       lat,
      lng:       lng,
      device:    navigator.userAgent
    };

    Object.entries(fields).forEach(([key, val]) => {
      const input = document.createElement("input");
      input.type = "hidden"; input.name = key; input.value = val;
      form.appendChild(input);
    });

    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);

    // Confirm after 3 seconds (Apps Script is usually fast)
    setTimeout(() => {
      btn.textContent = "✅ Logged!";
      showResult("success",
        `✅ Attendance submitted!\n\n📌 QR ID: ${qrId}\n🕐 Time: ${now.toLocaleString()}\n📍 Location: ${lat === "DENIED" || lat === "N/A" ? "Not available" : lat + ", " + lng}\n\n👉 Check your Google Sheet for the new row.`
      );
    }, 3000);
  }

  function showResult(type, msg) {
    const box = document.getElementById("resultBox");
    box.className = "result-box " + type;
    box.textContent = msg;
  }
</script>
</body>
</html>
